services:
  - type: web
    name: popup-store-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python -m backend.init_db
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: popup-store-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://popup-store-atlas.vercel.app,http://localhost:5173,http://127.0.0.1:5173

databases:
  - name: popup-store-db
    plan: free
    postgresMajorVersion: "15"

